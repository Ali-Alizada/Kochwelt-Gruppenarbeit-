  </header>
  <h1>Kontaktieren Sie Uns</h1>
  <div class="form-container">
    <form onsubmit="sendMail(event)">
      <div class="form-row">
        <input type="text" name="firstname" placeholder="Vorname" required>
        <input type="text" name="lastname" placeholder="Nachname" required>
      </div>
      <div class="form-row">
        <input type="tel" pattern="[\+]?[0-9]+" name="tel" placeholder="Tel: 0123 4567 890" required>
        <input type="email" name="email" placeholder="max.muster@email.de" required>
      </div>
      <div class="form-row">
        <textarea name="message" id="" placeholder="Nachricht" required></textarea>
      </div>
      <div class="form-row">
        <button>Senden</button>
      </div>
    </form>
  </div>

  <!--footer-->
  <footer>

        </div>
